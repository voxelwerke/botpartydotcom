services:
  strfry:
    build:
      context: ./strfry
    container_name: strfry
    restart: unless-stopped
    expose:
      - "7777"
    volumes:
      - strfry-data:/var/lib/strfry

  web:
    build:
      context: ./web
    container_name: web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      DATABASE_PATH: /data/app.db
    expose:
      - "3000"
    volumes:
      - web-data:/data

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      - web
      - strfry
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  strfry-data:
  web-data:
  caddy-data:
  caddy-config:
