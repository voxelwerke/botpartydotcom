services:
  strfry:
    build:
      context: ./strfry
    container_name: strfry
    restart: unless-stopped
    ports:
      - "7777:7777"
    volumes:
      - strfry-data:/var/lib/strfry

  web:
    image: node:22-alpine
    container_name: web
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app

volumes:
  strfry-data:
